<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Multiplication Table</title>
    <style>
        body {
            background-color: #ffe4e1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, 'Times New Roman', serif; 
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.08);
            width: 350px;
            text-align: center;
        }

        #table-container {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            font-size: 20px;
            line-height: 1.8;
            color: #222;
            text-align: left;
            padding-left: 40px;
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="table-container"></div>
    </div>

    <script>
        var n = prompt("Enter a Number to Create Table", "2");
        var displayArea = document.getElementById("table-container");
        var resultHTML = "<h1>Table of = " + n + "</h1>"; 

        for(var i = 1; i <= 10; i++) {
            resultHTML += n + " * " + i + " = <strong>" + (n * i) + "</strong><br>";
        }

        displayArea.innerHTML = resultHTML;
    </script>
</body>
</html>
