<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette</title>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, 'Times New Roman', serif;
            transition: background-color 0.6s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            color: white;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 24px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #color-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 12px;
        }

        button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: url('brush.png') 10 32, pointer;
        }

        button:hover {
            transform: scale(1.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border-color: white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Color Palette</h1>
        <div id="color-grid"></div>
    </div>

    <script>
        var row = 10;
        var col = 10;
        var c = 1;
        var gridHTML = "";
        var displayArea = document.getElementById("color-grid");

        while(c <= row) {
            for(var i = 1; i <= col; i++) {
                var red = Math.round(Math.random() * 255);
                var green = Math.round(Math.random() * 255);
                var blue = Math.round(Math.random() * 255);
                var mycolor = `rgb(${red},${green},${blue})`;

                gridHTML += "<button onclick='setcolor(this)' style='background:" + mycolor + "'></button>";
            }
            c++;
        }

        displayArea.innerHTML = gridHTML;

        function setcolor(d) {
            document.body.style.backgroundColor = d.style.background;
        }
    </script>
</body>
</html>
