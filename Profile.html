<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
    
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
<style>
:root 
{
 --bg-main: #0c0f17;      
 --bg-secondary: #1a1a2e; 
 --accent-pink: #b26c86;  
 --accent-light: #e2c2d2; 
 --text-body: #b0a8ba;    
 }

body {
margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-body);
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--accent-light);
            margin: 0;
        }

        
        
.hero-section 
{
min-height: 80vh;             
display: flex;
align-items: center;
justify-content: space-between;
padding: 5% 10%;
position: relative;
}

       
        .hero-section::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-pink) 0%, rgba(0,0,0,0) 70%);
            opacity: 0.2;
            z-index: -1; 
        }

        .hero-text {
            flex-basis: 50%; 
            z-index: 2;
        }

                .hero-text h1 {
            font-size: 300%;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--accent-light), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; 
        }

        .hero-text h2 {
            font-size: 1.5rem;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 3px;
            color: var(--accent-pink);
            margin-bottom: 30px;
        }

        .hero-text p {
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        
        .hero-image-container {
            flex-basis: 40%;
            position: relative;
            display: flex;
            justify-content: center;
        }

        
        .profile-blob {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid var(--accent-pink);n 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
             
        }

        .profile-blob img {
            width: 100%;
            height: 100%;
            object-fit: cover;
          object-position: top;
        }

               @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }


               .gallery-section {
            padding: 100px 10%;
            background-color: var(--bg-secondary); 
            text-align: center;
        }

        .section-title {
            font-size: 3rem;
            margin-bottom: 60px;
        }

        
        .slider-frame {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 20px;
            border: 1px solid rgba(178, 108, 134, 0.3);
            padding: 20px;
            background: var(--bg-main);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #gallery-img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 10px;
            display: block;
        }


    </style>
</head>
<body>

    <section class="hero-section">
        <div class="hero-text">
            <h2>HELLO! I AM IRA </h2>
            <h1>Designs That<br>Brings Ideas<br>to Life</h1>
            <p>Aspiring UI/UX designer passionate about creating intuitive and visually engaging digital experiences. Exploring design, branding, and web interfaces while constantly learning and growing creatively. Welcome to my design universe.</p>
        </div>

        <div class="hero-image-container">
            <div class="profile-blob">
            <img src="pfp1.png" alt="">           
        </div>
        </div>
    </section>




</body>
</html>
