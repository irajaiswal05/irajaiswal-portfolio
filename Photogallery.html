<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Photo Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0c0f17;
            --bg-secondary: #1a1a2e;
            --accent-pink: #b26c86;
            --accent-light: #e2c2d2;
        }

        body {
            background-color: var(--bg-main);
            color: var(--accent-light);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .header-box {
            background-color: #000000;
            display: inline-block;
            padding: 20px 50px;
            margin-top: 50px;
            margin-bottom: 60px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            border: 1px solid var(--accent-pink);
        }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 900px;
            margin: 0 auto 100px auto;
            padding: 0 20px;
        }

        .image-box {
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 2px solid var(--bg-secondary);
            transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .image-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(178, 108, 134, 0.6);
            border-color: var(--accent-pink);
        }

        .image-box:hover img {
            transform: scale(1.1);
        }

@media (max-width: 600px) {
    .gallery-grid {
        grid-template-columns: 1fr; 
    }






    </style>
</head>
<body>

    <div class="header-box">
        <h1>WEB PHOTO GALLERY</h1>
    </div>

    <div class="gallery-grid">
        <div class="image-box">
            <img src="street.jpg" alt="Gallery Image 1">
        </div>
        <div class="image-box">
            <img src="vg.jpg" alt="Gallery Image 2">
        </div>
        <div class="image-box">
            <img src="vnn.jpg" alt="Gallery Image 3">
        </div>
        <div class="image-box">
            <img src="garden.jpg" alt="Gallery Image 4">
        </div>
        <div class="image-box">
            <img src="cm.jpg" alt="Gallery Image 5">
        </div>
        <div class="image-box">
            <img src="lavender.jpg" alt="Gallery Image 6">
        </div>
    </div>

</body>
</html>
