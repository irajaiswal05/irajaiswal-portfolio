<!DOCTYPE html>
<html>
<head>
    <title>Video</title>
    <style>
        body {
            margin: 0px;
            padding: 0px;
            background-color: #f4f4f9;
        }
        
        header {
            font-size: 50px;
            text-transform: uppercase;
            font-family: Arial black;
            background: rgba(0, 0, 0, 0.42);
            margin-top: 50px;
            text-align: center;
            box-sizing: border-box;
            padding: 10px;
        }
        
        #text {
            color: rgb(255, 224, 70);
        }
        
        .video-container {
            text-align: center;
            margin-top: 40px;
        }
        
        video {
            width: 80%;
            max-width: 800px;
            border-radius: 10px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <header>
        <span id="text">Calm Nature Aesthetic</span>
    </header>

    <div class="video-container">
        <video controls autoplay loop muted>
            <source src="images/v1.mp4" type="video/mp4">
        </video>
    </div>

</body>
</html>
