<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0a192f;
            --bg-secondary: #172a45;
            --accent-pink: #ff007f;
            --text-main: #ccd6f6;
            --text-heading: #e6f1ff;
            --font-heading: 'Cinzel Decorative', serif;
            --font-subheading: 'Cormorant Garamond', serif;
            --font-body: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font-body);
            text-align: center;
        }

        .page-header {
            padding: 60px 20px 20px;
        }

        h1 {
            font-family: var(--font-heading);
            color: var(--text-heading);
            font-size: 3rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--accent-pink);
            font-family: var(--font-subheading);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 0;
        }

        .video-container {
            margin: 40px auto;
            width: 90%;
            max-width: 900px;
            background-color: var(--bg-secondary);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s ease;
        }

        .video-container:hover {
            border-color: var(--accent-pink);
            transform: translateY(-5px);
        }

        video {
            width: 100%;
            border-radius: 5px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>Nature Aesthetic</h1>
        
    </div>

    <div class="video-container">
        <video controls autoplay loop muted>
            <source src="images/v1.mp4" type="video/mp4">
        </video>
    </div>

</body>
</html>
