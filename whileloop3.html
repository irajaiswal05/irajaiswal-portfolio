<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ready</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffe4e1 0%, #ffb6c1 100%);
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        h1 {
            color: #d81b60;
            font-size: 38px;
            text-shadow: 2px 2px 10px rgba(216, 27, 96, 0.15);
            margin-bottom: 30px;
        }

        header {
            width: 70%;
            max-width: 800px;
            height: 500px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(216, 27, 96, 0.15);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <h1 id="m">Image of the </h1>
    <header>
        <img id="pic" src="">
    </header>

    <script>
        var d = new Date();
        var m = document.getElementById("m");
        var pic = document.getElementById("pic");
        
        var today = d.getDay();

        switch(today) {
            case 1:
                m.innerHTML += " Monday";
                pic.src = "images/p1.jpg";
                break;
            case 2:
                m.innerHTML += " Tuesday";
                pic.src = "images/p2.jpg";
                break;
            case 3:
                m.innerHTML += " Wednesday";
                pic.src = "images/p3.jpg";
                break;
            case 4:
                m.innerHTML += " Thursday";
                pic.src = "images/p4.jpg";
                break;
            case 5:
                m.innerHTML += " Friday";
                pic.src = "images/p5.jpg";
                break;
            case 6:
                m.innerHTML += " Saturday";
                pic.src = "images/p6.jpg";
                break;
            case 0:
                m.innerHTML += " Sunday";
                pic.src = "images/p7.jpg";
                break;
            default:
                pic.src = "images/p1.jpg";
        }

        document.title = "Ready";
    </script>
</body>
</html>
