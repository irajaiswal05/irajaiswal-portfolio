<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Slider</title>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, 'Times New Roman', serif;
            transition: background-color 0.6s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 80px; 
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px; 
            min-width: 350px; 
        }

        h1 {
            color: white;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #mask {
            width: 150px;
            height: 150px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            background: black;
        }

        #box {
            width: 1200px;
            display: flex;
            transition: margin-left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .pic {
            width: 150px;
            height: 150px;
            object-fit: cover;
            cursor: pointer;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 150px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Media Slider</h1>
        
        <div id="mask">
            <div id="box">
                <img src="images/P7.jpg" class="pic">
                <img src="images/p2.jpg" class="pic">
                <img src="images/p3.jpg" class="pic">
                <img src="images/p4.jpg" class="pic">
                <img src="images/p5.jpg" class="pic">
                <img src="images/p6.jpg" class="pic">
            </div>
        </div>

        <div class="controls">
            <input type="range" min="0" max="750" id="slider" oninput="move()">
            <input type="color" oninput="document.body.style.backgroundColor=this.value" value="#1a1a1a">
        </div>
    </div>

    <script>
        function move() {
            var slider = document.getElementById("slider");
            var box = document.getElementById("box");
            box.style.marginLeft = -slider.value + "px";
        }
    </script>
</body>
</html>
