<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link href="main.css" rel="stylesheet" type="text/css">
<style>
table {
    width: 100%;
    max-width: 600px;
    margin: 40px auto;
    background-color: #aec9e4;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(116, 94, 94, 0.1);
}

input[type="text"], 
input[type="Number"], 
textarea {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
}

</style>
<nav></nav>
<body>
    <header>
    <h1 class="textstyle"></h1>
    
    </header>


    <main>
        <table border="0" cellpadding="10">
            <caption>Registration <Form:get></Form:get></caption>
            <form action="http://tataplay/user/login.php" Method="post">

            <tr>
                <td><label for="forname">Name</label></td>
                <td><input title="Type name here" placeholder="Type First Name" id="forname" type="text" required></td>
            </tr>

            <tr>
                <td><label for="forage">Age</label></td>
                <td><input title="Type Age here" placeholder="Type your age" id="forage" type="number" required max="40" min="18"></td>
            </tr>

            <tr>
                <td><label>Message</label></td>
                <td><textarea rows="10" cols="40"></textarea></td>
            </tr>

            <tr>
                <td><label>Gender</label></td>
                <td>
                    Male <input type="radio" value="Male" name="gender">
                    Female <input type="radio" value="Female" name="gender">
                    Others <input type="radio" value="Other" name="gender">
                </td>
            </tr>

            <tr>
                <td><label>Hobby</label></td>
                <td>
                    Reading <input type="checkbox" value="Reading">
                    Writing <input type="checkbox" value="Writing">
                    Dancing <input type="checkbox" value="Dancing">
                </td>
            </tr>
            
            <tr>
                <td><label>Country</label></td>
                <td>
                    <select>
                        <option value="India">India</option>
                        <option value="USA">USA</option>
                        <option value="UK">UK</option>
                        <option value="China">China</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label>E-mail</label></td>
                <td><input type="email"></td>
            </tr>

            <tr>
                <td><label>Upload Picture</label></td>
                <td><input type="file"></td>
            </tr>

            <tr>
                <td><label>DOB</label></td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td><label>Time</label></td>
                <td><input type="time"></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Register">
                    <input type="reset">
                </td>
            </tr>
            
            </form>
        </table>
    </main>

    <footer></footer>
</body>
</html>
