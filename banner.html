<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(135deg, #fce4ec 0%, #ffb6c1 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
            font-family: 'Segoe UI', sans-serif;
            box-sizing: border-box;
        }

        .ui-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(216, 27, 96, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .banner {
            width: 800px;
            height: 450px;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #222;
        }

        .pic {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: 2s;
            object-fit: cover;
            transform-origin: center;
        }
    </style>
</head>
<body>

    <div class="ui-card">
        <div class="banner">
            <img src="images/p5.jpg" class="pic">
            <img src="images/p6.jpg" class="pic">
            <img src="images/P7.jpg" class="pic">
            <img src="images/p4.jpg" class="pic">
        </div>
    </div>

    <script>
        var plist = document.getElementsByTagName("img");
        
        var p1 = plist[3]; 
        var p2 = plist[2];
        var p3 = plist[1];
        var p4 = plist[0];
        
        var c = -1;

        function runbanner() {
            switch(c) {
                case 0:
                    p1.style.transform = "scale(0) rotate(360deg)";
                    p1.style.opacity = 0;
                    break;
                case 1:
                    p2.style.transform = "scale(0) rotate(360deg)";
                    p2.style.opacity = 0;
                    break;
                case 2:
                    p3.style.transform = "scale(0) rotate(360deg)";
                    p3.style.opacity = 0;
                    break;
                case 3:
                    break;
                case 4:
                    p1.style.transform = "scale(1) rotate(0)";
                    p2.style.transform = "scale(1) rotate(0)";
                    p3.style.transform = "scale(1) rotate(0)";
                    p4.style.transform = "scale(1) rotate(0)";

                    p1.style.opacity = 1;
                    p2.style.opacity = 1;
                    p3.style.opacity = 1;
                    p4.style.opacity = 1;
                    break;
            }

            if(c <= plist.length) {
                c++;
            } else {
                c = 0;
            }
            
            document.title = c;
            setTimeout("runbanner()", 6000); 
        }
        
        runbanner();
    </script>
</body>
</html>
