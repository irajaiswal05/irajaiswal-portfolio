<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(135deg, #fce4ec 0%, #ffb6c1 100%);
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        #nav {
            display: flex;
            justify-content: space-evenly;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
        }

        button {
            background: transparent;
            border: none;
            font-size: 18px;
            font-weight: bold;
            color: #d81b60;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover {
            background: rgba(216, 27, 96, 0.1);
        }

        #m, #m2, #m3 {
            position: absolute; 
            width: 150px;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.15);
            padding: 10px 0;
            overflow: hidden;
        }

        li {
            list-style-type: none;
            padding: 12px 20px;
            cursor: pointer;
            color: #333;
            transition: 0.2s;
            font-weight: 500;
        }

        li:hover {
            background: #d81b60;
            color: white;
        }

        .toggle {
            display: none;
        }
    </style>
</head>
<body>

    <div id="nav">
        <div>
            <button onclick="show_hide_menu(event)" id="menu1">Main</button>
            <ol id="m" class="toggle">
                <li>Main</li>
                <li>Project</li>
                <li>Practice</li>
            </ol>
        </div>

        <div>
            <button onclick="show_hide_menu(event)" id="menu2">Project</button>
            <ol id="m2" class="toggle">
                <li>HTML</li>
                <li>JavaScript</li>
                <li>BootStrap</li>
            </ol>
        </div>

        <div>
            <button onclick="show_hide_menu(event)" id="menu3">Social Media</button>
            <ol id="m3" class="toggle">
                <li>YouTube</li>
                <li>Instagram</li>
                <li>Facebook</li>
            </ol>
        </div>
    </div>

    <script>
        var m1 = document.getElementById("m");
        var m2 = document.getElementById("m2");
        var m3 = document.getElementById("m3");

        function show_hide_menu(event) {
            var mid = event.target.id;
            
            m1.classList.add("toggle");
            m2.classList.add("toggle");
            m3.classList.add("toggle");

            switch(mid) {
                case "menu1":
                    m1.classList.remove("toggle");
                    document.title = "Menu1";
                    break;
                case "menu2":
                    m2.classList.remove("toggle");
                    document.title = "Menu2";
                    break;
                case "menu3":
                    m3.classList.remove("toggle");
                    document.title = "Menu3";
                    break;
            }
        }

        window.onclick = function(event) {
            if((event.target == "[object HTMLHtmlElement]") || (event.target == "[object HTMLUnknownElement]"))
            {
                m1.classList.add("toggle");
                m2.classList.add("toggle");
                m3.classList.add("toggle");
            }
        }
    </script>

</body>
</html>
