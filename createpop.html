<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffe4e1 0%, #ffb6c1 100%);
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .mystyle {
            width: 320px;
            height: auto;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.15);
            padding: 20px;
            position: absolute;
            top: 30px;
            left: 30px;
            border-radius: 20px;
            box-sizing: border-box;
            text-align: center;
        }
    </style>
</head>
<body>
    <script>
        var p = document.createElement("div");

        function show() {
            document.body.appendChild(p);
            p.className = "mystyle";
            p.innerHTML = "<button onclick='document.body.removeChild(p)' style='margin-left:90%; font-size:14px; background:none; border:none; color:#d81b60; font-weight:bold; cursor:pointer;'>X</button>";
            p.innerHTML += "<br/><img style='width:100%; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.05); margin-top:10px;' src='images/ad1.gif'>";
            setTimeout("closeadd()", 10000);
        }

        document.title = "Ready";

        var t = setTimeout("show()", 2000);

        function closeadd() {
            document.body.removeChild(p);
        }
    </script>
</body>
</html>
