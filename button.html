<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle</title>
    <style>
        :root {
            --dark: rgb(9, 8, 8);
            --light: white;
            --tcolor: #d81b60;
        }

        body {
            background: var(--light);
            color: var(--dark);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .showcase {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            padding: 40px 60px;
            border-radius: 20px;
            background: rgba(128, 128, 128, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #b1 {
            background: transparent;
            border: 2px solid gray;
            border-radius: 10px;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--tcolor);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>

    <div class="showcase">
        <button id="b1">🌙</button>
        <label class="switch">
            <input type="checkbox" id="b2">
            <span class="slider"></span>
        </label>
    </div>

    <script>
        var b1 = document.getElementById("b1");
        var b2 = document.getElementById("b2"); 

        b1.onclick = function () {
            if (b1.innerHTML == "🌙") {
                b1.innerHTML = "🌞";
                b2.checked = true; 
                document.body.style.background = "var(--dark)";
                document.body.style.color = "var(--light)";
            } else {
                b1.innerHTML = "🌙";
                b2.checked = false; 
                document.body.style.background = "var(--light)";
                document.body.style.color = "var(--dark)";
            }
        }

        b2.onchange = function () {
            if (b2.checked == true) {
                b1.innerHTML = "🌞";
                document.body.style.background = "var(--dark)";
                document.body.style.color = "var(--light)";
            } else {
                b1.innerHTML = "🌙";
                document.body.style.background = "var(--light)";
                document.body.style.color = "var(--dark)";
            }
        }
    </script>
</body>
</html>
